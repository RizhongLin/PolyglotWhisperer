<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Library — PolyglotWhisperer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"
    />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="stylesheet" href="/library.css" />
  </head>
  <body>
    <header>
      <hgroup>
        <h1>Library</h1>
        <p>
          <img src="/icon.png" class="brand-logo" alt="" />PolyglotWhisperer
        </p>
      </hgroup>
      <button
        id="new-job-open"
        class="contrast new-job-btn"
        type="button"
      >+ New job</button>
      <button
        id="theme-toggle"
        class="outline secondary"
        aria-label="Toggle theme"
      ></button>
    </header>
    <main>
      <section id="jobs-strip" hidden></section>
      {content}
    </main>
    <dialog id="new-job-dialog">
      <article>
        <header>
          <h3 style="margin:0">New job</h3>
        </header>
        <form id="new-job-form">
          <fieldset>
            <label for="new-job-input">URL or local path</label>
            <input
              id="new-job-input"
              name="input"
              type="text"
              placeholder="https://..., /path/to/video.mp4"
              autocomplete="off"
            />
            <label for="new-job-file" style="margin-top:0.5rem">…or upload a file</label>
            <input id="new-job-file" name="file" type="file" />
          </fieldset>
          <div class="form-row">
            <div>
              <label for="new-job-language">Source language</label>
              <input
                id="new-job-language"
                name="language"
                type="text"
                value="{default_language}"
                required
              />
            </div>
            <div>
              <label for="new-job-translate">Translate to (optional)</label>
              <input
                id="new-job-translate"
                name="translate"
                type="text"
                value="{default_translate}"
                placeholder="e.g. en, zh"
              />
            </div>
          </div>
          <details>
            <summary>Advanced</summary>
            <div class="form-row">
              <div>
                <label for="new-job-backend">Whisper backend</label>
                <select id="new-job-backend" name="backend">
                  <option value="">(default: {default_backend})</option>
                  <option value="local">local</option>
                  <option value="api">api</option>
                </select>
              </div>
              <div>
                <label for="new-job-llm-backend">LLM backend</label>
                <select id="new-job-llm-backend" name="llm_backend">
                  <option value="">(default: {default_llm_backend})</option>
                  <option value="local">local</option>
                  <option value="api">api</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div>
                <label for="new-job-whisper-model">Whisper model</label>
                <input
                  id="new-job-whisper-model"
                  name="whisper_model"
                  type="text"
                  placeholder="default: {default_whisper_model}"
                />
              </div>
              <div>
                <label for="new-job-llm-model">LLM model</label>
                <input
                  id="new-job-llm-model"
                  name="llm_model"
                  type="text"
                  placeholder="default: {default_llm_model}"
                />
              </div>
            </div>
            <div class="form-row">
              <div>
                <label for="new-job-start">Start (ffmpeg)</label>
                <input
                  id="new-job-start"
                  name="start"
                  type="text"
                  placeholder="e.g. 00:01:00"
                />
              </div>
              <div>
                <label for="new-job-duration">Duration (ffmpeg)</label>
                <input
                  id="new-job-duration"
                  name="duration"
                  type="text"
                  placeholder="e.g. 00:05:00"
                />
              </div>
            </div>
            <div class="form-row">
              <div>
                <label for="new-job-chunk-size">Chunk size (segments)</label>
                <input
                  id="new-job-chunk-size"
                  name="chunk_size"
                  type="number"
                  min="1"
                  max="400"
                  placeholder="auto"
                />
              </div>
              <div class="checkbox-row" style="align-self:end">
                <label><input type="checkbox" name="refine" /> Refine</label>
                <label><input type="checkbox" name="subs" /> Existing subs</label>
              </div>
            </div>
          </details>
          <div id="new-job-error" role="alert"></div>
          <div class="dialog-actions">
            <button id="new-job-cancel" type="button" class="outline secondary">Cancel</button>
            <button id="new-job-submit" type="submit">Start job</button>
          </div>
        </form>
      </article>
    </dialog>
    <footer>
      <p><img src="/logo.png" class="footer-logo" alt="PolyglotWhisperer" /></p>
      <p>
        <span class="footer-brand">PolyglotWhisperer</span>
        <span class="footer-sep">&middot;</span>
        <em>Video transcription &amp; translation for language learners</em>
      </p>
      <p>
        <a class="footer-gh" href="{github_url}" target="_blank" rel="noopener"
          ><i data-lucide="github"></i> GitHub</a
        >
      </p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      const root = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const LIGHT = 'light', DARK = 'dark';
      const prefersDark = matchMedia('(prefers-color-scheme: dark)');

      function getEffective() {{
        const saved = localStorage.getItem('pgw-theme');
        if (saved) return saved;
        return prefersDark.matches ? DARK : LIGHT;
      }}
      function applyTheme(theme) {{
        root.dataset.theme = theme;
        const icon = theme === DARK ? 'sun' : 'moon';
        toggle.innerHTML = `<i data-lucide="${{icon}}"></i>`;
        lucide.createIcons({{ nodes: [toggle] }});
      }}
      applyTheme(getEffective());
      toggle.addEventListener('click', () => {{
        const next = root.dataset.theme === DARK ? LIGHT : DARK;
        localStorage.setItem('pgw-theme', next);
        applyTheme(next);
      }});
      prefersDark.addEventListener('change', () => {{
        if (!localStorage.getItem('pgw-theme')) applyTheme(getEffective());
      }});

      // Sticky header scroll effect
      const hdr = document.querySelector('header');
      if (hdr) {{
        window.addEventListener('scroll', () => {{
          hdr.classList.toggle('scrolled', window.scrollY > 8);
        }}, {{ passive: true }});
      }}

      lucide.createIcons();
    </script>
    <script src="/jobs.js"></script>
  </body>
</html>
