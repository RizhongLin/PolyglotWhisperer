<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>{title} — PolyglotWhisperer</title>
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
<link rel="stylesheet" href="/player.css">
</head>
<body>
<header>
  <hgroup>
    <h1>{title}</h1>
    <p>PolyglotWhisperer</p>
  </hgroup>
  <button id="theme-toggle" class="outline secondary"
    aria-label="Toggle theme"></button>
</header>
<main>
  <video id="player" controls autoplay>
    <source src="/{video_filename}" type="{video_mime}">
    {tracks}
  </video>

  <div class="tracks" id="track-controls"></div>

  <div class="transcript" id="transcript">
    <div class="transcript-header">
      <i data-lucide="scroll-text"></i> Transcript
    </div>
    <span class="copy-toast" id="copy-toast">
      <i data-lucide="check"></i> Copied
    </span>
    <div class="transcript-body" id="transcript-body"></div>
  </div>

  <div class="panel">
    <article>
      <div class="section-label">
        <i data-lucide="info"></i> Details
      </div>
      <div class="meta-list">
        <dl>{metadata_rows}</dl>
      </div>
    </article>
    <article>
      <div class="section-label">
        <i data-lucide="download"></i> Downloads
      </div>
      <div class="dl-list">
        <ul>{download_rows}</ul>
      </div>
    </article>
  </div>
</main>
<footer>
  <p>
    <strong>PolyglotWhisperer</strong> &mdash;
    Video transcription &amp; translation for language learners
  </p>
  <p><small><a href="{github_url}" target="_blank"
    rel="noopener"><i data-lucide="github"></i> GitHub</a></small></p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  // --- Theme toggle ---
  const root = document.documentElement;
  const toggle = document.getElementById('theme-toggle');
  const LIGHT = 'light', DARK = 'dark';
  const prefersDark = matchMedia('(prefers-color-scheme: dark)');

  function getEffective() {{
    const saved = localStorage.getItem('pgw-theme');
    if (saved) return saved;
    return prefersDark.matches ? DARK : LIGHT;
  }}
  function applyTheme(theme) {{
    root.dataset.theme = theme;
    const icon = theme === DARK ? 'sun' : 'moon';
    toggle.innerHTML = `<i data-lucide="${{icon}}"></i>`;
    lucide.createIcons({{ nodes: [toggle] }});
  }}
  applyTheme(getEffective());
  toggle.addEventListener('click', () => {{
    const next = root.dataset.theme === DARK ? LIGHT : DARK;
    localStorage.setItem('pgw-theme', next);
    applyTheme(next);
  }});
  prefersDark.addEventListener('change', () => {{
    if (!localStorage.getItem('pgw-theme')) applyTheme(getEffective());
  }});

  // --- Helpers ---
  const video = document.getElementById('player');
  const tracks = video.textTracks;

  function fmtTime(s) {{
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }}

  // --- Subtitle track toggles ---
  const controls = document.getElementById('track-controls');

  for (let i = 0; i < tracks.length; i++) {{
    const t = tracks[i];
    const id = 'track-' + i;
    const isDefault = (i === 0);
    const label = document.createElement('label');
    const chk = isDefault ? ' checked' : '';
    label.innerHTML =
      `<input type="checkbox" id="${{id}}"${{chk}}>` +
      `<span><i data-lucide="captions"></i>${{t.label}}</span>`;
    label.querySelector('input').addEventListener('change', (e) => {{
      t.mode = e.target.checked ? 'showing' : 'hidden';
      buildTranscript();
    }});
    controls.appendChild(label);
    t.mode = isDefault ? 'showing' : 'hidden';
  }}

  // --- Transcript ---
  const transcriptBody = document.getElementById('transcript-body');
  const copyToast = document.getElementById('copy-toast');
  let transcriptCues = [];
  let activeRow = -1;
  let toastTimer;

  // Loose timing: anticipate before cue starts, linger after cue ends
  const ANTICIPATE = 0.3;
  const LINGER = 0.8;

  function getFirstShowingTrack() {{
    for (let i = 0; i < tracks.length; i++) {{
      if (tracks[i].mode === 'showing') return tracks[i];
    }}
    return null;
  }}

  function buildTranscript() {{
    const track = getFirstShowingTrack();
    if (!track || !track.cues || track.cues.length === 0) {{
      transcriptBody.innerHTML =
        '<div class="transcript-empty">No transcript available</div>';
      transcriptCues = [];
      return;
    }}
    transcriptCues = [];
    let html = '';
    for (let i = 0; i < track.cues.length; i++) {{
      const cue = track.cues[i];
      const text = cue.text.replace(/<[^>]*>/g, '').trim();
      if (!text) continue;
      transcriptCues.push(cue);
      html += `<div class="cue-row future" data-idx="${{transcriptCues.length - 1}}">`
        + `<span class="cue-time">${{fmtTime(cue.startTime)}}</span>`
        + `<span class="cue-text">${{text}}</span></div>`;
    }}
    transcriptBody.innerHTML = html;
    transcriptBody.querySelectorAll('.cue-row').forEach((row) => {{
      row.addEventListener('click', () => {{
        const idx = parseInt(row.dataset.idx);
        if (idx === activeRow) {{
          // Active row: copy text
          const text = row.querySelector('.cue-text').textContent;
          navigator.clipboard.writeText(text).then(() => {{
            copyToast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1200);
          }});
        }} else {{
          // Other rows: seek
          video.currentTime = transcriptCues[idx].startTime;
          if (video.paused) video.play();
        }}
      }});
    }});
    highlightActiveCue();
  }}

  function highlightActiveCue() {{
    if (transcriptCues.length === 0) return;
    const t = video.currentTime;
    let idx = -1;
    for (let i = 0; i < transcriptCues.length; i++) {{
      const cue = transcriptCues[i];
      if (t >= cue.startTime - ANTICIPATE && t < cue.endTime + LINGER) {{
        idx = i; break;
      }}
    }}

    if (idx === activeRow) return;

    const rows = transcriptBody.querySelectorAll('.cue-row');

    // Update classes on all rows
    for (let i = 0; i < rows.length; i++) {{
      rows[i].classList.remove('active', 'past', 'future');
      if (idx >= 0) {{
        if (i < idx) rows[i].classList.add('past');
        else if (i === idx) rows[i].classList.add('active');
        else rows[i].classList.add('future');
      }} else {{
        // No active cue — mark all as past if before current time
        if (transcriptCues[i] && t >= transcriptCues[i].endTime) {{
          rows[i].classList.add('past');
        }} else {{
          rows[i].classList.add('future');
        }}
      }}
    }}

    // Auto-scroll to active row
    if (idx >= 0 && idx < rows.length) {{
      const container = transcriptBody;
      const row = rows[idx];
      const rowTop = row.offsetTop - container.offsetTop;
      const target = rowTop - container.clientHeight / 2 + row.clientHeight / 2;
      container.scrollTop = target;
    }}
    activeRow = idx;
  }}

  video.addEventListener('timeupdate', highlightActiveCue);

  function waitForCues() {{
    const track = getFirstShowingTrack();
    if (track && track.cues && track.cues.length > 0) {{
      buildTranscript();
    }} else {{
      setTimeout(waitForCues, 200);
    }}
  }}
  waitForCues();

  // Render all Lucide icons
  lucide.createIcons();
</script>
</body>
</html>
