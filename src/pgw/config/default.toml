[whisper]
backend = "api"
local_model = "large-v3-turbo"
api_model = "whisper-large-v3-turbo"
language = "fr"
device = "auto"
word_timestamps = true

[llm]
backend = "api"
local_model = "qwen3:8b"
api_model = "deepseek-chat"
temperature = 0.3
max_tokens = 16384
timeout = 300
num_retries = 2
refine_enabled = false
translation_enabled = true
target_language = "en"

[download]
format = "bv*[ext=mp4]+ba[ext=m4a]/bv*+ba/b"
subtitles = false

[player]
backend = "mpv"
sub_font_size = 40

[general]
workspace_dir = "./pgw_workspace"
