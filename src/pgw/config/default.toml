[whisper]
backend = "local"
local_model = "large-v3-turbo"
api_model = "groq/whisper-large-v3-turbo"
language = "fr"
device = "auto"
word_timestamps = true

[llm]
backend = "local"
local_model = "ollama_chat/qwen3:8b"
api_model = "openrouter/openai/gpt-oss-120b"
api_base = "http://localhost:11434"
temperature = 0.3
max_tokens = 16384
timeout = 300
num_retries = 2
cleanup_enabled = false
translation_enabled = true
target_language = "en"

[download]
format = "bv*[ext=mp4]+ba[ext=m4a]/bv*+ba/b"
subtitles = true

[player]
backend = "mpv"
sub_font_size = 40

[general]
workspace_dir = "./pgw_workspace"
