# Dev-mode override — mount source code so changes are picked up instantly
# without rebuilding the Docker image.
#
# Usage:
#   cd frontend && npm run build          # rebuild frontend (one-time, or use npm run dev)
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Python:  change src/pgw/*.py  → restart with `docker compose restart pgw`
# Frontend: change frontend/*.tsx → `npm run build` → refresh browser
#           (or run `npm run dev` locally for HMR at http://127.0.0.1:5173)

services:
  pgw:
    volumes:
      # Mount host source code over the built-in copy.  Python auto-reload
      # (uvicorn --reload) is not enabled, so restart the container to see
      # Python changes:  docker compose restart pgw
      - ./src:/app/src
      # Mount host-built frontend dist.  After `npm run build` on the host,
      # the new bundle is live immediately — no container restart needed.
      - ./src/pgw/templates/dist:/app/src/pgw/templates/dist
      # Mount data directory (same as production compose)
      - .:/data
    environment:
      # Override to use the host-mounted SPA bundle
      - PGW_SPA_DIR=/app/src/pgw/templates/dist
